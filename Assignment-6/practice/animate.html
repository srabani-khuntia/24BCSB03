<html>
    <head>
        <title>Animation</title>
        <style>
            div{
                width: 100px;
                height: 100px;
                background: red;
                animation-name: example;
                animation-duration: 5s;
                animation-iteration-count: infinite;
            }
            @keyframes example{
                0%{background: red;}
                25%{background: yellow;}
                50%{background: blue;}
                100%{background: green;}
            }
        </style>
    </head>
    <body>
        <div></div>
    </body>
</html>
