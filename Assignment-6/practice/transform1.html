<html>
    <head>
        <title>Transform</title>
        <style>
            div{
                width: 300px;
                height: 200px;
                background: yellow;
                border: 1px solid black;
            }
            div#myDiv{transform: rotate(20deg);}
        </style>
    </head>
    <body>
        <div>This is a normal div element.</div>
        <div id="myDiv">This div element is rotated 20 degrees.</div>
    </body>
</html>
