<html>
    <head>
        <title>Gradient</title>
        <style>
            #grad1{
                height: 150px;
                width: 150px;
                background-color: red;
                background-image: radial-gradient(closest-side at 60% 55%, red, yellow, black, transparent);
            }
            #grad2{
                height: 150px;
                width: 150px;
                background-color: red;
                background-image: radial-gradient(farthest-side at 60% 55%, red, yellow, black, transparent);
            }
            #grad3{
                height: 150px;
                width: 150px;
                background-color: red;
                background-image: radial-gradient(closest-corner at 60% 55%, red, yellow, black, transparent);
            }
            #grad4{
                height: 150px;
                width: 150px;
                background-color: red;
                background-image: radial-gradient(farthest-corner at 60% 55%, red, yellow, black, transparent);
            }
        </style>
    </head>
    <body>
        <div id="grad1"></div><br><br><br>
        <div id="grad2"></div><br><br><br>
        <div id="grad3"></div><br><br><br>
        <div id="grad4"></div>
    </body>
</html>
