<html>
    <head>
        <title>Transition</title>
        <style>
            div{
                width: 100px;
                height: 100px;
                background: yellow;
                border: 1px solid black;
                transition: width 2s, height 4s;
            }
            div:hover{
                width: 300px;
                height: 300px;
            }
        </style>
    </head>
    <body>
        <div></div> 
    </body>
</html>
