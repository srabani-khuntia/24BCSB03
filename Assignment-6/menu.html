<html>
    <head>
        <title>Menu</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            #header{
                height:15%;
                width: 100%;
                background-image: url("logo.png");
                background-position: center;
                background-size: contain;
                background-repeat:no-repeat;
                padding-top: 15px;
                padding-bottom: 15px;
                box-sizing: border-box;
                background-origin: content-box;
            }
            #menu{
                height: 7%;
                width: 100%;
                background: rgb(134, 117, 64);
                float: left;
            }
            ul{
                list-style-type: none;
                padding: 0px;
                margin: 0px;
            }
            li{
                display: inline;
                margin-left: 5px;
                margin-right: 5px;
                margin-top: 5px;
                margin-bottom: 5px;
                padding-left: 5px;
                padding-right: 5px;
                padding-top: 5px;
                padding-bottom: 5px;
                background: rgb(192, 130, 16);
                border-radius: 10pt;
                border-style: solid inset;
                border-color: black;
                font-size: 0.7cm;
                color: white;
            }
            li a:hover{background: rgb(140, 104, 5);}
            #link{
                height: 60%;
                width: 25%;
                background: rgb(127, 91, 8);
                float: left;
            }
            p a:hover{background: rgba(94, 87, 30, 0.358);}
            #section{
                height: 60%;
                width: 75%;
                background: rgb(238, 218, 102);
                float: left;
            }
            #footer{
                height: 5%;
                width: 100%;
                background: rgb(69, 68, 15);
                float: left;
                color: white;
                font-family: cursive;
                font-style: italic;
                font-size: medium;
                align-items: center;
                display:flex
            }
        </style>
    </head>
    <body>
        <div id="header"></div>
        <div id="menu">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Contact</a></li>
                <li><a href="">Gallery</a></li>
                <li><a href="">Blog</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Others</a></li>
            </ul>
        </div>
        <div id="link">
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Library</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Canteen</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">News</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Sports</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Events</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Campus</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Faculty</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Student</a></p>
            <p style="background: magenta; font-size: 0.5cm; margin: 5px 5px 5px 5px; padding: 5px 5px 5px 5px;"><a href="">Others</a></p>
        </div>
        <div id="section">
            <h1 align="center"><u>Login Info</u></h1>
            <center>
                <form name="Form" method="POST" action="">
                    <table height="150" width="250">
                        <tr>
                            <td>Enter ID:</td>
                            <td><input type="text" name="text1" placeholder="Enter your ID"></td>
                        </tr>
                        <tr>
                            <td>Enter Password:</td>
                            <td><input type="password" name="text2" placeholder="Enter your Password"></td>
                        </tr>
                        <tr>
                            <td align="center"><input type="button" value="Submit" onclick="myvalidate()"></td>
                            <td align="center"><input type="button" value="Reset"></td>
                        </tr>
                        <tr>
                            <td><input type="checkbox">Stay Signed In</td>
                            <td align="right"><a href="">Forgotten Password?</a></td>
                        </tr>
                    </table>
                </form>
            </center>
        </div>
        <div id="footer">
            <marquee>This site is designed and maintained by Srabani</marquee>
        </div>
    </body>
</html>
