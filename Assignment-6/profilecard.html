<html>
    <head>
        <title>Profile Card</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body{
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                background-color: rgb(239, 232, 232);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .profile-card{
                background-color: white;
                border-radius: 5px;
                padding: 7%;
                width: 20%;
                min-width: 250px;
                height: 60%;
                min-height: 350px;
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .profile-picture{
                width: 100px;
                height: 100px;
                border-radius: 50%;
                border: 5px solid green;
            }    
        </style>
    </head>
    <body>
        <div class="profile-card">
            <div class="profile-picture">Hello</div>
        </div>
    </body>
</html>
