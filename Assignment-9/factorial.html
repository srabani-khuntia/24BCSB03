<html>
    <head>
        <title>Factorial</title>
        <script>
            var num, f=1, i;
            num=parseInt(prompt("Enter number: "));
            for(i=1; i<=num; i++)
                f*=i;
            document.write("Factorial of "+num+" is "+f);
        </script>
    </head>
    <body bgcolor="pink" text="green">
    </body>
</html>
