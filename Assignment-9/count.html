<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var a = new Array(2,4,5,3,2,2,5);
        var count = {};
        var i;

        for(i = 0; i < a.length; i++){

            if(count[a[i]]){
                count[a[i]]++;
            }
            else{
                count[a[i]] = 1;
            }
        }       
        for(var key in count){
            document.write(key + " occurs " + count[key] + " times <br>");
        }
    </script>
</head>
<body>

</body>
</html>
