<html>
    <head>
        <title>Grade</title>
        <script>
            var mark;
            mark=parseInt(prompt("Enter marks: "));
            if (mark>=90)
                document.write("A");
            else if (mark>=75)
                document.write("B");
            else if (mark>=50)
                document.write("C");
            else
                document.write("Fail");
        </script>
    </head>
    <body bgcolor="pink" text="green">
    </body>
</html>
