<html>
    <head>
        <title>Greater</title>
        <script>
            var a,b;
            a=parseInt(prompt("Enter a: "));
            b=parseInt(prompt("Enter b: "));
            
            (a>b)?document.write("a is greater"):document.write("b is greater");
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
