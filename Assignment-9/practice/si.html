<html>
    <head>
        <title>Simle Interest</title>
        <script>
            var p,r,t,si;
            p=parseInt(prompt("Enter principal: "))
            r=parseInt(prompt("Enter rate of interest: "))
            t=parseInt(prompt("Enter time period: "))
            si=(p*r*t)/100;
            document.write("Simple interest="+si); 
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
