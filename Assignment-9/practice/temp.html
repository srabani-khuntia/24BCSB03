<html>
    <head>
        <title>Temperature</title>
        <script>
            var f,c;
            f=parseFloat(prompt("Enter temperature in Fahrenheit : "))
            c=(f-32)*5/9;
            document.write("Temperature in celsius scale is="+c);
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
