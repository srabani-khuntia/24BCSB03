<html>
    <head>
        <title>Calculator</title>
        <script>
            var n1,n2,a,s,m,d,md;
            n1=parseInt(prompt("Enter 1st number: "))
            n2=parseInt(prompt("Enter 2nd number: "))
            a=n1+n2;
            s=n1-n2;
            m=n1*n2;
            d=n1/n2;
            md=n1%n2;
            document.write("Addition value="+a+"<br>");
            document.write("Subtraction value="+s+"<br>");
            document.write("Multiplication value="+m+"<br>");
            document.write("Division value="+d+"<br>");
            document.write("Modulo division value="+md);
        </script>
    </head>
    <body bgcolor="pink" text="green">
    </body>
</html>
