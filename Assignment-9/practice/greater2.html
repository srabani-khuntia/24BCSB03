<html>
    <head>
        <title>Greater between 2 numbers</title>
        <script  language="JavaScript">
            var a,b;
            a=parseInt(prompt("Enter a: "));
            b=parseInt(prompt("Enter b: "));
            
            if(a>b)
                document.write("a is greater");
            else
                document.write("b is greater"); 
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
