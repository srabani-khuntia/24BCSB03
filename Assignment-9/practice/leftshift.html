<html>
    <head>
        <title>Bitwise Left-Shift Operator</title>
        <script>
            var a,b,c;
            a=parseInt(prompt("Enter a: "));
            b=parseInt(prompt("Enter b: "));
            c=a<<b; 
            document.write(value of c=”+c);
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
