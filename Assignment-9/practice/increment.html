<html>
    <head>
        <title>Increment</title>
        <script>
            var a,b,c;
            a=parseInt(prompt("Enter a : "));
            b=a++ + ++a;
            c=++a + a++;
            document.write("value of b="+b+"<br>");
            document.write("value of c="+c); 
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
