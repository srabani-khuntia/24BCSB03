<html>
    <head>
        <title>Leap Year</title>
        <script>
            var year;
            year=parseInt(prompt("Enter year : "));
            ( ((year%100!=0) && (year%4==0)) ||(year%400==0)) ? document.write("Leap year"):document.write("Not Leap year");

        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
