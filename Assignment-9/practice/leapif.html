<html>
    <head>
        <title>Leap Year</title>
        <script  language="JavaScript">
            var y;
            y=parseInt(prompt("Enter year: "));
            if(y%100!=0)
                if(y%4==0)
                    document.write("leap year");
                else
                    document.write("not");  
            else
                if(y%400==0)
                    document.write("leap year");
                else
                    document.write("not");
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
