
<html>
    <head>
        <title>Circle</title>
        <script>
            var r, a, c;
            r = parseFloat(prompt("Enter the radius of the circle:"));
            a = 3.141 * r * r;
            c = 2 * 3.141 * r;

            document.write("Radius entered: " + r + "<br>");
            document.write("Area of circle = " + a + "<br>");
            document.write("Circumference of circle = " + c);
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
