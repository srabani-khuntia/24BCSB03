<html>
    <head>
        <title>Swap Using 3rd Variable</title>
        <script>
            var a,b,c;
            a=parseInt(prompt("Enter a: "))
            b=parseInt(prompt("Enter b: "))
            document.write("Before swapping:"+"<br>"+"a="+a+"<br>"+"b="+b+"<br>")
            c=a;
            a=b;
            b=c;
            document.write("After swapping:"+"<br>"+"a="+a+"<br>"+"b="+b)
        </script>
    </head>
    <body bgcolor="pink" text="blue">
    </body>
</html>
