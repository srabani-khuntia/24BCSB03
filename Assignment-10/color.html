<!DOCTYPE html>
<html>
<head>
    <title>Background</title>
</head>
<body>
    <div id="colorBox" style="width: 100%; height: 100px; border: 1px solid black; margin-bottom: 10px;">
        Target Div
    </div>
    <button onclick="changeColor('red')">Red</button>
    <button onclick="changeColor('green')">Green</button>
    <button onclick="changeColor('blue')">Blue</button>

    <script>
        function changeColor(colorName) {
            var userConfirmed = confirm("Do you really want to change the background color to " + colorName + "?");
            if (userConfirmed) {
                document.getElementById("colorBox").style.backgroundColor = colorName;
            }
        }
    </script>
</body>
</html>
