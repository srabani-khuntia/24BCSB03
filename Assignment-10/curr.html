<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f4; 
            padding: 20px; 
        }
        
        .converter-card {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            margin: 50px auto; 
        }

        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            box-sizing: border-box;
        }
        button {
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .error { color: red; font-size: 14px; }
    </style>
</head>
<body>

    <div class="converter-card">
        <h2 style="text-align: center;">Currency Converter</h2>
        
        <label>From:</label>
        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR">INR</option>
            <option value="AUD">AUD</option>
        </select>
        
        <input type="number" id="amount" placeholder="Enter amount">

        <label>To:</label>
        <select id="toCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR" selected>INR</option>
            <option value="AUD">AUD</option>
        </select>

        <input type="text" id="result" placeholder="Converted amount" readonly>

        <button onclick="convert()">Convert</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <script>
        const conversionRates = {
            USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
            EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
            GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
            INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
            AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
        };

        function convert() {
            var fromCurr = document.getElementById("fromCurrency").value;
            var toCurr = document.getElementById("toCurrency").value;
            var amount = document.getElementById("amount").value;
            var errorMsg = document.getElementById("errorMsg");
            var resultBox = document.getElementById("result");

            errorMsg.innerHTML = "";
            resultBox.value = "";

            if (amount === "") {
                errorMsg.innerHTML = "Error: Amount field cannot be empty.";
                return;
            }

            if (fromCurr === toCurr) {
                errorMsg.innerHTML = "Error: 'From' and 'To' currencies cannot be the same.";
                return;
            }

            var rate = conversionRates[fromCurr][toCurr];
            var finalAmount = amount * rate;
            
            resultBox.value = finalAmount.toFixed(2);
        }
    </script>

</body>
</html>
