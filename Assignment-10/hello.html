<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replace</title>
    <script>
        function replace(){
            var a = document.getElementById("1").value
            a = "Welcome to DOM Manipulation"
            document.write(a)    
        }
    </script>
</head>
<body>
    <h2 id="1">Hello World</h2>
    <input type="button" value="Replace" onclick = "replace()">
</body>
</html>
