<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            margin: 0;
        }
        .form-container { 
            width: 100%; 
            max-width: 450px; 
            padding: 30px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1); 
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #555;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input[type="text"], 
        input[type="email"], 
        input[type="password"], 
        textarea, 
        select {
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
        }
        textarea {
            resize: vertical;
        }
        .gender-options {
            margin-bottom: 10px;
        }
        .gender-options input {
            margin-right: 5px;
        }
        .gender-options label {
            display: inline;
            font-weight: normal;
            margin-right: 15px;
        }
        button { 
            padding: 12px 15px; 
            background: #000; 
            color: white; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 16px;
        }
        button:hover { 
            background: #333; 
        }
        #messageBox {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Registration Form</h2>
        
        <form onsubmit="return validateForm()">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your full name">

            <label>Gender:</label>
            <div class="gender-options">
                <input type="radio" name="gender" value="Male" id="male"> 
                <label for="male">Male</label>
                
                <input type="radio" name="gender" value="Female" id="female"> 
                <label for="female">Female</label>
            </div>

            <label for="mobile">Mobile Number:</label>
            <input type="text" id="mobile" placeholder="10-digit mobile number">

            <label for="address">Address:</label>
            <textarea id="address" rows="3" placeholder="Enter your full address"></textarea>

            <label for="country">Country:</label>
            <select id="country">
                <option value="">--Select Country--</option>
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="Australia">Australia</option>
            </select>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="example@email.com">

            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="6-15 characters">

            <div id="messageBox"></div>

            <button type="submit">Register</button>
        </form>
    </div>

    <script>
        function showMessage(msg, isSuccess) {
            var msgBox = document.getElementById("messageBox");
            msgBox.innerHTML = msg;
            msgBox.style.display = "block";
            
            if (isSuccess) {
                msgBox.style.backgroundColor = "#d4edda";
                msgBox.style.color = "#155724";
                msgBox.style.border = "1px solid #c3e6cb";
            } else {
                msgBox.style.backgroundColor = "#f8d7da";
                msgBox.style.color = "#721c24";
                msgBox.style.border = "1px solid #f5c6cb";
            }
        }

        function validateForm() {
            var name = document.getElementById("name").value.trim();
            var mobile = document.getElementById("mobile").value.trim();
            var address = document.getElementById("address").value.trim();
            var country = document.getElementById("country").value;
            var email = document.getElementById("email").value.trim();
            var password = document.getElementById("password").value;
            
            var genderSelected = document.querySelector('input[name="gender"]:checked');

            if (name === "" || mobile === "" || address === "" || country === "" || email === "" || password === "" || !genderSelected) {
                showMessage("Error: All fields are required.", false);
                return false;
            }

            var mobileRegex = /^[0-9]{10}$/; 
            if (!mobileRegex.test(mobile)) {
                showMessage("Error: Mobile number must be exactly 10 digits.", false);
                return false;
            }

            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage("Error: Please enter a valid email address.", false);
                return false;
            }
            if (password.length < 6 || password.length > 15) {
                showMessage("Error: Password length must be between 6 and 15 characters.", false);
                return false;
            }
            showMessage("Registration Successful! Welcome, " + name + ".", true);
            
            return false; 
        }
    </script>

</body>
</html>
