
<html>
    <head>
        <title>Display Property</title>
        <style>
            .same-line {
                display: inline-block;
                margin-right: 20px; 
            }
            .separate-lines {
                display: block;
                margin-top: 10px; 
                font-weight: bold;
            }
        </style>
    </head>
    <body>

        <h1 class="same-line">HTML</h1>
        <h2 class="same-line">CSS</h2>
        <h3 class="same-line">JavaScript</h3>
        <hr style="margin: 30px 0;"> <span class="separate-lines">JSP</span>
        <span class="separate-lines">JDBC</span>
        <span class="separate-lines">MySQL</span>

    </body>
</html>
